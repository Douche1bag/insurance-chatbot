<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบเอกสารที่อัปโหลด</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e40af;
            margin-bottom: 10px;
        }
        .info {
            background: #eff6ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background: #2563eb;
        }
        .document {
            background: #f9fafb;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        .document-title {
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .stat {
            display: inline-block;
            background: white;
            padding: 5px 10px;
            border-radius: 4px;
            margin: 4px;
            font-size: 12px;
            border: 1px solid #e5e7eb;
        }
        .success { color: #059669; }
        .error { color: #dc2626; }
        .collection-badge {
            background: #8b5cf6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 ตรวจสอบเอกสารที่อัปโหลด</h1>
        
        <div class="info">
            <strong>📌 คำแนะนำ:</strong><br>
            • เอกสารของผู้ใช้จัดเก็บใน <code>user_documents</code> collection<br>
            • เอกสารระบบจัดเก็บใน <code>thai_insurance_docs</code> collection (201 เอกสาร)<br>
            • แต่ละเอกสารมี Vector Embedding สำหรับการค้นหา
        </div>

        <div class="controls">
            <input 
                type="text" 
                id="userIdInput" 
                placeholder="User ID (default: guest)" 
                value="guest"
            >
            <button onclick="loadDocuments()">📋 โหลดเอกสาร</button>
            <button onclick="checkCollections()">📊 ตรวจสอบ Collections</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        async function loadDocuments() {
            const userId = document.getElementById('userIdInput').value || 'guest';
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>⏳ กำลังโหลด...</p>';

            try {
                const response = await fetch(`${API_BASE}/user/documents?userId=${userId}`);
                const result = await response.json();

                if (result.success) {
                    let html = `
                        <h2>📂 เอกสารของผู้ใช้: ${userId}</h2>
                        <div class="info">
                            <span class="collection-badge">${result.collection}</span>
                            <strong>จำนวนทั้งหมด:</strong> ${result.count} เอกสาร
                        </div>
                    `;

                    if (result.count === 0) {
                        html += '<p class="error">❌ ไม่พบเอกสาร ลองอัปโหลดไฟล์ใหม่</p>';
                    } else {
                        result.data.forEach((doc, index) => {
                            const hasEmbedding = doc.hasEmbedding ? 
                                `<span class="success">✅ มี Vector</span>` : 
                                `<span class="error">❌ ไม่มี Vector</span>`;
                            
                            html += `
                                <div class="document">
                                    <div class="document-title">${index + 1}. ${doc.title}</div>
                                    <div class="stat">📄 ID: ${doc.id}</div>
                                    <div class="stat">📝 ความยาว: ${doc.contentLength.toLocaleString()} ตัวอักษร</div>
                                    <div class="stat">🔢 Embedding: ${doc.embeddingDimensions} มิติ</div>
                                    <div class="stat">${hasEmbedding}</div>
                                    <div class="stat">📅 ${new Date(doc.createdAt).toLocaleString('th-TH')}</div>
                                </div>
                            `;
                        });
                    }

                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = `<p class="error">❌ Error: ${result.error}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="error">❌ เกิดข้อผิดพลาด: ${error.message}</p>`;
            }
        }

        async function checkCollections() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>⏳ กำลังตรวจสอบ Collections...</p>';

            try {
                // Check user documents
                const userResponse = await fetch(`${API_BASE}/user/documents?userId=guest&limit=100`);
                const userResult = await userResponse.json();

                // Check system documents
                const systemResponse = await fetch(`${API_BASE}/documents?limit=10`);
                const systemResult = await systemResponse.json();

                let html = `
                    <h2>📊 สรุป Collections</h2>
                    <div class="document">
                        <div class="document-title">
                            <span class="collection-badge">user_documents</span> เอกสารผู้ใช้
                        </div>
                        <div class="stat">📊 จำนวน: ${userResult.count} เอกสาร</div>
                        <div class="stat">💡 สำหรับ: เอกสารที่ผู้ใช้อัปโหลด (แยกตาม userId)</div>
                    </div>
                    <div class="document">
                        <div class="document-title">
                            <span class="collection-badge" style="background: #10b981">thai_insurance_docs</span> เอกสารระบบ
                        </div>
                        <div class="stat">📊 จำนวน: 201 เอกสาร</div>
                        <div class="stat">💡 สำหรับ: เอกสารกรมธรรม์ระบบ (สำหรับทุกคน)</div>
                    </div>
                `;

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<p class="error">❌ เกิดข้อผิดพลาด: ${error.message}</p>`;
            }
        }

        // Auto-load on page load
        window.addEventListener('load', () => loadDocuments());
    </script>
</body>
</html>
